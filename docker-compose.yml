# =============================================================================
# ProduktívPro — Docker Compose (helyi build + futtatás)
# =============================================================================
#
# Indítás (build + start):
#   docker compose up -d --build
#
# Leállítás:
#   docker compose down
#
# Csak újraindítás (rebuild nélkül):
#   docker compose restart
#
# Logok:
#   docker compose logs -f
#
# FONTOS: az "appdata" nevű named volume tárolja az adatbázist.
# Ez a kötet a Docker által kezelt, újraindítás után is megmarad.
# Helye: /var/lib/docker/volumes/produktivpro_appdata/_data/
#
# Ha Unraid-en futtatod, használd helyette a deploy/unraid/produktivpro.xml
# sablont, vagy add meg az Unraid host path-t a volumes szekcióban.
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Ha hálózati problémád van npm ci közben (pl. proxy mögött):
      # network: host
    image: produktivpro:latest
    container_name: produktivpro
    restart: unless-stopped
    ports:
      - "8080:5050"
    volumes:
      # Named volume — adatbázis + JWT secret + backupok megőrzése újraindítás után
      - appdata:/data
    environment:
      # Admin PIN — csak az első indításkor használja (ha nincs admin a DB-ben)
      # FONTOS: az első bejelentkezés után változtasd meg a PIN-t!
      DEFAULT_ADMIN_PIN: "${DEFAULT_ADMIN_PIN:-1234}"
      DEFAULT_ADMIN_NAME: "${DEFAULT_ADMIN_NAME:-Admin}"
      # JWT Secret — KÖTELEZŐ production-ban (min. 32 karakter).
      # Generálás: node -e "console.log(require('crypto').randomBytes(48).toString('hex'))"
      JWT_SECRET: "${JWT_SECRET}"
      NODE_ENV: production
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # CORS — BIZTONSÁGI BEÁLLÍTÁS!
      # LAN-only (nincs internet): "*" elfogadható
      # Internet-elérés (Cloudflare Tunnel): állítsd be a saját domainre!
      # Pl. CORS_ORIGIN=https://produktivpro.pelda.hu
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-28800}"
      # COOKIE_SECURE — BIZTONSÁGI BEÁLLÍTÁS!
      # false: HTTP is elfogadható (LAN / Cloudflare Tunnel — ő kezeli az SSL-t)
      # true: HTTPS kötelező (ha saját SSL tanúsítványod van)
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  # Named volume — Docker kezeli, automatikusan perzisztens
  appdata:
    name: produktivpro_appdata
