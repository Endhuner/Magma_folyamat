# =============================================================================
# ProduktívPro — Release workflow (all-in-one Unraid image)
# =============================================================================
# Trigger: git tag push (pl. v1.0.0) VAGY GitHub Release létrehozása
#
# Mit csinál:
#   1. Buildi a Dockerfile.unraid-et (frontend + API egyben)
#   2. Feltölti GHCR-be:
#      - ghcr.io/OWNER/REPO:latest        ← Watchtower ezt figyeli
#      - ghcr.io/OWNER/REPO:v1.2.3        ← verziós tag (rollback-hez)
#      - ghcr.io/OWNER/REPO:1.2           ← minor verzió tag
#   3. GitHub Release-hez automatikus changelog és Docker pull parancs
#
# Verzió létrehozása:
#   git tag v1.0.0 && git push origin v1.0.0
#   → elindul ez a workflow, Watchtower pedig max 24 órán belül frissít
#
# Watchtower beállítása (ha még nincs):
#   docker run -d \
#     --name watchtower \
#     -v /var/run/docker.sock:/var/run/docker.sock \
#     containrrr/watchtower \
#     --cleanup \
#     --interval 86400 \
#     produktivpro    ← csak ezt a konténert figyeli
# =============================================================================

name: Release (Unraid all-in-one)

on:
  push:
    tags:
      - 'v*.*.*'          # v1.0.0, v1.2.3, stb.
  workflow_dispatch:       # kézi indítás (pl. teszteléshez)
    inputs:
      tag:
        description: 'Verzió tag (pl. v1.0.0)'
        required: false
        default: 'dev'

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # GitHub Release létrehozásához
      packages: write      # GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Verzió kiolvasása ────────────────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # v1.2.3 → 1.2.3 és 1.2
          SEMVER="${VERSION#v}"
          MINOR="${SEMVER%.*}"
          echo "version=${VERSION}"   >> $GITHUB_OUTPUT
          echo "semver=${SEMVER}"     >> $GITHUB_OUTPUT
          echo "minor=${MINOR}"       >> $GITHUB_OUTPUT

      # ── All-in-one image build + push ────────────────────────────────────
      - name: Build & push all-in-one image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64   # x86 Unraid + NAS ARM support
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.version.outputs.semver }}
            ${{ env.IMAGE }}:${{ steps.version.outputs.minor }}
          labels: |
            org.opencontainers.image.title=ProduktívPro
            org.opencontainers.image.version=${{ steps.version.outputs.semver }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=unraid
          cache-to: type=gha,scope=unraid,mode=max

      # ── GitHub Release létrehozása ────────────────────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true   # automatikus changelog a commit-okból
          body: |
            ## Telepítés / Frissítés

            **Első telepítés** (Unraid terminálban):
            ```bash
            docker run -d \
              --name produktivpro \
              --restart unless-stopped \
              -p 8080:80 \
              -v /mnt/user/appdata/produktivpro:/data \
              -e DEFAULT_ADMIN_PIN=1234 \
              ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ```

            **Watchtower** automatikusan frissíti a `latest` tag-et figyelő konténereket.

            **Kézi frissítés:**
            ```bash
            docker pull ${{ env.IMAGE }}:latest
            docker restart produktivpro
            ```

            **CA template URL** (Unraid → Apps → Settings → My Repositories):
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/unraid/produktivpro.xml
            ```
