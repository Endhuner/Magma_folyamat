# =============================================================================
# ProduktívPro — Release workflow (all-in-one Unraid image)
# =============================================================================
# Trigger: git tag push (pl. v1.0.0)
#
# Verzió létrehozása:
#   git tag v1.0.0 && git push origin v1.0.0
# =============================================================================

name: Release (Unraid all-in-one)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Verzió tag (pl. v1.0.0)'
        required: false
        default: 'dev'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Kisbetűs image név (GHCR követelmény) + verzió kiolvasása
      - name: Prepare build metadata
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          SEMVER="${VERSION#v}"
          MINOR="${SEMVER%.*}"

          echo "image=${IMAGE}"     >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "semver=${SEMVER}"   >> $GITHUB_OUTPUT
          echo "minor=${MINOR}"     >> $GITHUB_OUTPUT

      # All-in-one image build + push
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.semver }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.minor }}
          labels: |
            org.opencontainers.image.title=ProduktívPro
            org.opencontainers.image.version=${{ steps.meta.outputs.semver }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=unraid
          cache-to: type=gha,scope=unraid,mode=max

      # GitHub Release automatikus changelog-gal
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Telepítés / Frissítés

            **Első telepítés** (Unraid terminálban):
            ```bash
            docker run -d \
              --name produktivpro \
              --restart unless-stopped \
              -p 8080:5050 \
              -v /mnt/user/appdata/produktivpro:/data \
              -e DEFAULT_ADMIN_PIN=1234 \
              ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ```

            **Kézi frissítés:**
            ```bash
            docker pull ${{ steps.meta.outputs.image }}:latest
            docker restart produktivpro
            ```

            **CA template URL** (Unraid → Apps → Settings → My Repositories):
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/unraid/produktivpro.xml
            ```
