# =============================================================================
# ProduktívPro — Release workflow (all-in-one Unraid image)
# =============================================================================
# Trigger:
#   - main branch push → csak "latest" tag épül (gyors fejlesztés)
#   - git tag push (pl. v1.0.0) → latest + verziószámok épülnek
#
# Verzió létrehozása:
#   git tag v1.1.0 && git push origin v1.1.0
# =============================================================================

name: Release (Unraid all-in-one)

on:
  push:
    branches:
      - main
      - feature/fejlesztesek-teszt
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Kisbetűs image név + verzió/tag meghatározása
      - name: Prepare build metadata
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO_LOWER}"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            SEMVER="${VERSION#v}"
            MINOR="${SEMVER%.*}"
            TAGS="${IMAGE}:latest,${IMAGE}:${VERSION},${IMAGE}:${SEMVER},${IMAGE}:${MINOR}"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            VERSION="dev-${GITHUB_SHA::7}"
            TAGS="${IMAGE}:latest"
          else
            # Feature/teszt branch → KÜLÖN :test tag, a :latest-et NEM érinti.
            VERSION="test-${GITHUB_SHA::7}"
            TAGS="${IMAGE}:test"
          fi

          echo "image=${IMAGE}"     >> $GITHUB_OUTPUT
          echo "tags=${TAGS}"       >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # All-in-one image build + push
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ProduktívPro
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=unraid
          cache-to: type=gha,scope=unraid,mode=max

      # GitHub Release — csak tag push esetén
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
